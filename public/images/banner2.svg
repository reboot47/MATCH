<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <!-- グラデーション背景 -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43CEA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#185A9D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" rx="12" ry="12" fill="url(#grad2)" />
  
  <!-- 装飾パターン -->
  <circle cx="120" cy="60" r="20" fill="rgba(255,255,255,0.2)" />
  <circle cx="650" cy="200" r="25" fill="rgba(255,255,255,0.2)" />
  <circle cx="750" cy="80" r="15" fill="rgba(255,255,255,0.2)" />
  <circle cx="350" cy="220" r="18" fill="rgba(255,255,255,0.2)" />
  
  <!-- メインテキスト -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" filter="url(#shadow)">マッチング率UP</text>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9">プレミアム機能で出会いの可能性が3倍に</text>
  
  <!-- CTAボタン -->
  <rect x="60" y="150" width="180" height="44" rx="22" ry="22" fill="white" filter="url(#shadow)" />
  <text x="85" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#43CEA2">機能を確認する</text>
  
  <!-- 円形装飾 -->
  <circle cx="650" cy="120" r="70" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" />
  <text x="635" y="135" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white">3倍</text>
</svg>
