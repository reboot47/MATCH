<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <!-- グラデーション背景 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3EADCF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ABE9CD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" rx="12" ry="12" fill="url(#grad1)" />
  
  <!-- 装飾パターン -->
  <circle cx="160" cy="40" r="15" fill="rgba(255,255,255,0.2)" />
  <circle cx="600" cy="180" r="20" fill="rgba(255,255,255,0.2)" />
  <circle cx="720" cy="60" r="25" fill="rgba(255,255,255,0.2)" />
  <circle cx="300" cy="200" r="18" fill="rgba(255,255,255,0.2)" />
  
  <!-- メインテキスト -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" filter="url(#shadow)">特別割引キャンペーン</text>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9">今だけプレミアムプランが30%OFF</text>
  
  <!-- CTAボタン -->
  <rect x="60" y="150" width="160" height="44" rx="22" ry="22" fill="white" filter="url(#shadow)" />
  <text x="90" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3EADCF">詳しく見る</text>
  
  <!-- 円形装飾 -->
  <circle cx="650" cy="120" r="70" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" />
  <text x="625" y="115" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">30%</text>
  <text x="625" y="150" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">OFF</text>
</svg>
